/*
 * ---------------------------------------------------------------------------
 * Vader Backend Service - Gradle Build Configuration
 * ---------------------------------------------------------------------------
 */

plugins {
    id 'java'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'

    // Import OpenAPI Generator Plugin
    id "org.openapi.generator" version "7.5.0"
}

java {
    sourceCompatibility = '23'
    targetCompatibility = '23'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

dependencies {
    // 0. Core Engine Integration
    // loom-core was moved into vader

    // 1. Web & Virtual Threads (Spring WebMVC handles VT via configuration)
    implementation 'org.springframework.boot:spring-boot-starter-web'
    
    // 2. Data Persistence (JPA works natively with Virtual Threads)
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    
    // 3. Messaging (NATS Core Client)
    implementation 'io.nats:jnats:2.20.5'
    
    // 4. Database Migration & Driver
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'
    runtimeOnly 'org.postgresql:postgresql'
    
    // 5. Utilities & Observability
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    
    // --- [Phase 2] IAM & Security ---
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'io.jsonwebtoken:jjwt-api:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.5'
    implementation 'com.github.ben-manes.caffeine:caffeine'
    
    // --- [Phase 3] Observability (OTel & Micrometer) ---
    implementation 'io.micrometer:micrometer-registry-otlp'
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'

    // --- [Phase 4] Audit & ClickHouse ---
    implementation 'com.clickhouse:clickhouse-jdbc:0.9.7:all'

    // --- [Phase 5] Asset Storage (AWS S3 SDK) ---
    implementation platform('software.amazon.awssdk:bom:2.25.11')
    implementation 'software.amazon.awssdk:s3'

    // --- [OpenAPI Generation Dependencies] ---
    implementation 'org.springframework.boot:spring-boot-starter-validation' // Provides @Valid, @NotNull annotations support
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.21'
    implementation 'jakarta.validation:jakarta.validation-api'
    implementation 'org.openapitools:jackson-databind-nullable:0.2.6'
    
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.testcontainers:postgresql'
}

// ---------------------------------------------------------------------------
// OpenAPI Generator Task Configuration
// ---------------------------------------------------------------------------
openApiGenerate {
    generatorName = "spring"
    inputSpec = "$rootDir/holocron/openapi.yaml"
    outputDir = "$buildDir/generated/openapi"
    apiPackage = "com.deathstar.vader.api"
    modelPackage = "com.deathstar.vader.dto.generated"

    schemaMappings = [
        "SseEmitter": "org.springframework.web.servlet.mvc.method.annotation.SseEmitter"
    ]

    importMappings = [
        "SseEmitter": "org.springframework.web.servlet.mvc.method.annotation.SseEmitter"
    ]

    typeMappings = [
        "SseEmitter": "org.springframework.web.servlet.mvc.method.annotation.SseEmitter"
    ]
    
    configOptions = [
        interfaceOnly: "true",
        useSpringBoot3: "true",
        skipDefaultInterface: "true",
        openApiNullable: "false",
        useTags: "true",
        // Hack 2: Force all Controller methods to return ResponseEntity, preserving Header control
        useResponseEntity: "true" 
    ]
}

// Add the generated code paths to the SourceSet so Spring Boot and the compiler can pick them up
tasks.named('bootRun') {
    // Required to support Loom Scoped Values preview features during local dev
    jvmArgs = ['--enable-preview']
}

sourceSets {
    main {
        java {
            srcDirs += "$buildDir/generated/openapi/src/main/java"
        }
    }
}

// Ensure OpenAPI code generation runs before compilation
compileJava.dependsOn tasks.named('openApiGenerate')

tasks.named('test') {
    useJUnitPlatform()
    jvmArgs += ['--enable-preview']
}

bootJar {
    layered {
        enabled = true
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['--enable-preview']
}