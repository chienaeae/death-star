# ---------------------------------------------------------------------------
# Death Star - Generic Backend Configuration
# ---------------------------------------------------------------------------
spring:
  application:
    name: vader

  # Default to 'dev' profile for seamless local DX
  profiles:
    active: dev

  # THE CORE OF VADER PERFORMANCE:
  threads:
    virtual:
      enabled: true

  # Flyway Migration Strategy
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Standard JPA/Hibernate configuration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # Schema is strictly managed by Flyway
    properties:
      hibernate:
        format_sql: true

management:
  server:
    port: 8081 # Independent ops port to prevent external traffic from accidentally hitting monitoring endpoints via Gateway
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true # Enable tiered liveness/readiness probes designed specifically for K8s
  
  # Observability - OpenTelemetry & Micrometer
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        step: 10s
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  tracing:
    sampling:
      probability: 1.0 # 100% sampling for development/testing
  metrics:
    tags:
      application: ${spring.application.name}

# Application Log Pattern with Trace Injection
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"