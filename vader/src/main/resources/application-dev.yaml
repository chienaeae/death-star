# ---------------------------------------------------------------------------
# Development Profile (Targeting local Docker Compose infra)
# ---------------------------------------------------------------------------
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/deathstar
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

nats:
  url: nats://localhost:4222

# Database initialization strategies
  sql:
    init:
      mode: always # Ensure migrations happen rapidly on local boot

# Fast-fail for developer experience
management:
  health:
    db:
      enabled: false

storage:
  provider: minio
  bucket: deathstar-assets
  minio:
    endpoint: http://localhost:9000
    accessKey: admin
    secretKey: password
    publicUrl: http://localhost:9000

audit:
  clickhouse:
    jdbc-url: jdbc:ch:http://localhost:8123/default
    username: default
    password: password
    connection-test-query: SELECT 1

logging:
  level:
    com.deathstar.vader: DEBUG