openapi: 3.0.3
info:
  title: Death Star API
  description: Event-driven microservices architecture for real-time synchronization.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Main API Gateway

security:
  - bearerAuth: []

paths:
  # ==========================================
  # IAM Routes
  # ==========================================
  /auth/register:
    post:
      tags: [Auth]
      summary: User Registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: Registration successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: User Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Silent Refresh Access Token
      security: []
      # Define input Cookie to let the generator output @CookieValue
      parameters:
        - in: cookie
          name: refreshToken
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke tokens
      # Define input Cookie
      parameters:
        - in: cookie
          name: refreshToken
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Logout successful

  /auth/me:
    get:
      tags: [Auth]
      summary: Get Current User Profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ==========================================
  # Business Routes (Todos)
  # ==========================================
  /todos:
    get:
      tags: [Todos]
      summary: Get all todos
      responses:
        '200':
          description: A list of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
    post:
      tags: [Todos]
      summary: Create a new todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoRequest'
      responses:
        '201':
          description: Created todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'

  # SSE Route
  /events:
    get:
      tags: [Todos]
      summary: Subscribe to Server-Sent Events
      description: Returns a text/event-stream for real-time updates.
      responses:
        '200':
          description: SSE Stream connection established
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SseEmitter'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Virtual SseEmitter Schema, to be intercepted and replaced in Gradle
    SseEmitter:
      type: object
      description: Virtual schema mapped to Spring WebMVC SseEmitter at compile time.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      required: [accessToken, expiresIn]
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          format: int64

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, LOCKED]
        role:
          type: string
          enum: [USER, ADMIN, JEDI, SITH]

    Todo:
      type: object
      required: [id, title, completed, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        completed:
          type: boolean
        createdAt:
          type: string
          format: date-time
          
    TodoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string