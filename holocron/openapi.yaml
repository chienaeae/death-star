openapi: 3.0.3
info:
  title: Death Star API
  description: Event-driven microservices architecture for real-time synchronization.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Main API Gateway

security:
  - bearerAuth: []

paths:
  # ==========================================
  # IAM Routes
  # ==========================================
  /auth/register:
    post:
      tags: [Auth]
      summary: User Registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: Registration successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: User Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Silent Refresh Access Token
      security: []
      # Define input Cookie to let the generator output @CookieValue
      parameters:
        - in: cookie
          name: refreshToken
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke tokens
      # Define input Cookie
      parameters:
        - in: cookie
          name: refreshToken
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Logout successful

  /auth/me:
    get:
      tags: [Auth]
      summary: Get Current User Profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ==========================================
  # User Profile Routes
  # ==========================================
  /users/profile:
    get:
      tags: [Users]
      summary: Get Current User Profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
    put:
      tags: [Users]
      summary: Update Current User Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  # ==========================================
  # Workspace Routes
  # ==========================================
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List all workspaces the user is a member of
      responses:
        '200':
          description: A list of workspaces.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
    post:
      tags: [Workspaces]
      summary: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreateRequest'
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'

  /workspaces/{id}/active:
    post:
      tags: [Workspaces]
      summary: Set a workspace as the active workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workspace set as active

  /workspaces/{id}/invitations:
    post:
      tags: [Workspaces]
      summary: Invite a user by email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInviteRequest'
      responses:
        '200':
          description: Invitation sent

  /workspaces/invitations/{token}/accept:
    post:
      tags: [Workspaces]
      summary: Accept a workspace invitation
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'

  # ==========================================
  # Field Definition Routes
  # ==========================================
  /tasks/fields:
    get:
      tags: [Task Fields]
      summary: Get all Field Definitions
      description: Returns all configured fields (system and custom) for the current tenant.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      responses:
        '200':
          description: A list of field definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskFieldDefinition'
    post:
      tags: [Task Fields]
      summary: Create a newly defined Custom Field
      description: Allows users to create dynamic custom fields for their workspace.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskFieldDefinitionRequest'
      responses:
        '201':
          description: Field created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskFieldDefinition'

  # ==========================================
  # Event Handling Routes
  # ==========================================
  /events:
    get:
      tags: [Events]
      summary: Subscribe to Server-Sent Events (SSE)
      description: Returns a stream of real-time events.
      responses:
        '200':
          description: Event stream established
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SseEmitter'

  # ==========================================
  # Asset Routes (Upload and Management)
  # ==========================================
  /assets/upload-url:
    post:
      tags: [Assets]
      summary: Pre-register an asset and get a presigned upload URL
      description: Clients must use this URL to directly PUT the file to S3/MinIO.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUrlRequest'
      responses:
        '201':
          description: Presigned URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUrlResponse'


  # ==========================================
  # Board Routes
  # ==========================================
  /boards:
    get:
      tags: [Boards]
      summary: List Boards
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      responses:
        '200':
          description: A list of boards accessible by the user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Board'
                  
    post:
      tags: [Boards]
      summary: Create a Board
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardCreateRequest'
      responses:
        '200':
          description: Returns the created Board model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
                  
  /boards/{boardId}/columns:
    post:
      tags: [Boards]
      summary: Create a Column
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardColumnCreateRequest'
      responses:
        '200':
          description: Returns the created Column model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardColumn'
                  
  /boards/{boardId}:
    get:
      tags: [Boards]
      summary: Get Board Details
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The Board, including its Columns and Tasks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
                
  /boards/{boardId}/tasks:
    post:
      tags: [Boards]
      summary: Create a Task
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardTaskCreateRequest'
      responses:
        '200':
          description: Returns the created task ID.
          content:
            text/plain:
              schema:
                type: string

  /boards/{boardId}/tasks/{taskId}:
    put:
      tags: [Boards]
      summary: Update a Task
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardTaskUpdateRequest'
      responses:
        '200':
          description: Task updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardTask'

  /boards/{boardId}/tasks/{taskId}/move:
    post:
      tags: [Boards]
      summary: Move a Task via LexRank
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdHeader'
        - name: boardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTaskRequest'
      responses:
        '200':
          description: Task moved successfully.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    WorkspaceIdHeader:
      name: X-Workspace-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid

  schemas:
    # Virtual SseEmitter Schema, to be intercepted and replaced in Gradle
    SseEmitter:
      type: object
      description: Virtual schema mapped to Spring WebMVC SseEmitter at compile time.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      required: [accessToken, expiresIn]
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          format: int64

    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    FieldType:
      type: string
      enum: [LEXRANK, STATUS, LONG_TEXT, MARKDOWN, STRING, INTEGER, BOOLEAN]
      
    BucketType:
      type: string
      enum: [DYNAMIC, STATIC]

    TaskFieldDefinition:
      type: object
      required:
        - id
        - name
        - fieldType
        - bucketType
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        fieldType:
          $ref: '#/components/schemas/FieldType'
        bucketType:
          $ref: '#/components/schemas/BucketType'

    TaskFieldDefinitionRequest:
      type: object
      required:
        - name
        - fieldType
      properties:
        name:
          type: string
        fieldType:
          $ref: '#/components/schemas/FieldType'
        bucketType:
          $ref: '#/components/schemas/BucketType'
          format: int64

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, LOCKED]
        role:
          type: string
          enum: [USER, ADMIN, JEDI, SITH]

    UserProfile:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
          format: uri
        email:
          type: string
          format: email
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true

    UserProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarAssetId:
          type: string
          format: uuid



    PresignedUrlRequest:
      type: object
      required: [filename, contentType]
      properties:
        filename:
          type: string
          description: The original filename to extract extension.
        contentType:
          type: string
          description: The MIME type of the file.

    PresignedUrlResponse:
      type: object
      required: [uploadUrl, method, assetId]
      properties:
        uploadUrl:
          type: string
        method:
          type: string
          example: PUT
        assetId:
          type: string
          format: uuid

    Board:
      type: object
      required: [id, title, tenantId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        tenantId:
          type: string
        createdAt:
          type: string
          format: date-time
        columns:
          type: array
          items:
            $ref: '#/components/schemas/BoardColumn'

    BoardColumn:
      type: object
      required: [id, boardId, title, orderIndex, createdAt]
      properties:
        id:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        title:
          type: string
        orderIndex:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/BoardTask'

    BoardTask:
      type: object
      required: [id, type, version, status, title, lexRank]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: Represents the Loom bucket routing strategy. Default is DefaultItem.
        version:
          type: integer
          format: int64
          description: Current OCC base version
        title:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        status:
          type: string
          description: Correlates to a BoardColumn ID
          format: uuid
        lexRank:
          type: string
          description: The LexRank split-point used for UI ordering.
        attributes:
          type: object
          additionalProperties:
            type: string
          description: Custom dynamic attributes for this task.

    BoardTaskUpdateRequest:
      type: object
      required: [currentVersion]
      properties:
        currentVersion:
          type: integer
          format: int64
          description: Current OCC base version
        title:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        attributes:
          type: object
          additionalProperties:
            type: string
          description: Custom attributes to merge or update.

    BoardTaskCreateRequest:
      type: object
      required: [title, status]
      properties:
        title:
          type: string
        status:
          type: string
          description: The ID of the BoardColumn to place this task into.
          format: uuid

    BoardCreateRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    BoardColumnCreateRequest:
      type: object
      required: [title, orderIndex]
      properties:
        title:
          type: string
        orderIndex:
          type: integer
          format: int32
          
    MoveTaskRequest:
      type: object
      required: [newStatusId, currentVersion]
      properties:
        currentVersion:
          type: integer
          format: int64
          description: Current OCC base version
        newStatusId:
          type: string
          description: The ID of the BoardColumn to move this task into.
          format: uuid
        prevLexRank:
          type: string
          nullable: true
          description: The LexRank of the task immediately above the new position (null if top).
        nextLexRank:
          type: string
          nullable: true
          description: The LexRank of the task immediately below the new position (null if bottom).

    Workspace:
      type: object
      required: [id, name, ownerId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ownerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        isActive:
          type: boolean
          description: Whether this workspace is currently active for the requesting user
        isDefault:
          type: boolean
          description: Whether this is the default workspace created upon registration
        ownerEmail:
          type: string
          nullable: true
          description: The resolved email address of the workspace owner

    WorkspaceCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    WorkspaceInviteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    WorkspaceMember:
      type: object
      required: [workspaceId, userId, role]
      properties:
        workspaceId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          type: string

    WorkspaceInvitation:
      type: object
      required: [id, workspaceId, email, token, status, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        token:
          type: string
        status:
          type: string
          enum: [PENDING, ACCEPTED, EXPIRED]
        expiresAt:
          type: string
          format: date-time