openapi: 3.0.3
info:
  title: Death Star API
  description: Event-driven microservices architecture for real-time synchronization.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Main API Gateway

security:
  - bearerAuth: []

paths:
  # ==========================================
  # IAM Routes
  # ==========================================
  /auth/register:
    post:
      tags: [Auth]
      summary: User Registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: Registration successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: User Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Silent Refresh Access Token
      security: []
      # Define input Cookie to let the generator output @CookieValue
      parameters:
        - in: cookie
          name: refreshToken
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke tokens
      # Define input Cookie
      parameters:
        - in: cookie
          name: refreshToken
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Logout successful

  /auth/me:
    get:
      tags: [Auth]
      summary: Get Current User Profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ==========================================
  # User Profile Routes
  # ==========================================
  /users/profile:
    get:
      tags: [Users]
      summary: Get Current User Profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
    put:
      tags: [Users]
      summary: Update Current User Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  # ==========================================
  # Asset Routes (Upload and Management)
  # ==========================================
  /assets/upload-url:
    post:
      tags: [Assets]
      summary: Pre-register an asset and get a presigned upload URL
      description: Clients must use this URL to directly PUT the file to S3/MinIO.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUrlRequest'
      responses:
        '201':
          description: Presigned URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUrlResponse'



components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Virtual SseEmitter Schema, to be intercepted and replaced in Gradle
    SseEmitter:
      type: object
      description: Virtual schema mapped to Spring WebMVC SseEmitter at compile time.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      required: [accessToken, expiresIn]
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          format: int64

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, LOCKED]
        role:
          type: string
          enum: [USER, ADMIN, JEDI, SITH]

    UserProfile:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
          format: uri
        email:
          type: string
          format: email
          readOnly: true
        createdAt:
          type: string
          format: date-time
          readOnly: true

    UserProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarAssetId:
          type: string
          format: uuid



    PresignedUrlRequest:
      type: object
      required: [filename, contentType]
      properties:
        filename:
          type: string
          description: The original filename to extract extension.
        contentType:
          type: string
          description: The MIME type of the file.

    PresignedUrlResponse:
      type: object
      required: [uploadUrl, method, assetId]
      properties:
        uploadUrl:
          type: string
        method:
          type: string
          example: PUT
        assetId:
          type: string
          format: uuid