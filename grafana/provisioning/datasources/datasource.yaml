apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    jsonData:
      server: clickhouse
      port: 9000
      username: default
      tlsSkipVerify: true
    secureJsonData:
      password: "password"
    isDefault: true
