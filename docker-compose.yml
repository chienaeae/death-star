services:
  postgres:
    image: postgres:16-alpine
    container_name: deathstar-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deathstar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deathstar"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: deathstar-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP management & monitoring
    command: ["-m", "8222"]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: deathstar-clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123" # HTTP UI
      - "9000:9000" # Native port for OTel
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init-db.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: deathstar-otel
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP http receiver
    depends_on:
      clickhouse:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    container_name: deathstar-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      clickhouse:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: deathstar-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console port
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-03-30T11-55-48Z
    container_name: deathstar-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      sleep 2;
      mc alias set local http://minio:9000 admin password;
      echo 'Creating bucket...';
      mc mb local/deathstar-assets || true;
      echo 'Setting public policy...';
      mc anonymous set download local/deathstar-assets;
      echo 'MinIO init completed.';
      "

volumes:
  postgres_data:
  clickhouse_data:
  minio_data: