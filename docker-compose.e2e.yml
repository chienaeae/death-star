# ---------------------------------------------------------------------------
# Death Star - End-to-End (E2E) Testing Environment
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deathstar_e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  nats:
    image: nats:2.10-alpine
    command: ["-m", "8222"]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./clickhouse/init-db.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      clickhouse:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      clickhouse:
        condition: service_healthy

  vader:
    build:
      context: .
      dockerfile: vader/Dockerfile
    environment:
      # Inject E2E profile for specific test data seeding
      - SPRING_PROFILES_ACTIVE=e2e
      - E2E_DB_URL=jdbc:postgresql://postgres:5432/deathstar_e2e
      - E2E_DB_USER=postgres
      - E2E_DB_PASSWORD=password
      - E2E_NATS_URL=nats://nats:4222
      # OpenTelemetry Endpoint points to the docker container otel-collector
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - MANAGEMENT_OTLP_METRICS_EXPORT_URL=http://otel-collector:4318/v1/metrics
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      # Give JVM and Spring Boot sufficient time to spin up in Docker Mac
      start_period: 20s

  skywalker:
    build:
      context: .
      dockerfile: skywalker/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      vader:
        condition: service_healthy